# Smithery manifest — https://smithery.ai
#
# Lets users install this server into any Smithery-supported client
# (Claude Desktop, Claude Code, Cursor, Windsurf, etc.) with a single
# command. Submit the repo at https://smithery.ai/new.

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      iaAccessKey:
        type: string
        title: Internet Archive access key (optional)
        description: >
          Raises the Internet Archive rate-limit ceiling. Generate one at
          https://archive.org/account/s3.php. Pair with iaSecretKey.
      iaSecretKey:
        type: string
        title: Internet Archive secret key (optional)
        description: Paired with iaAccessKey above.
  commandFunction: |-
    (config) => ({
      command: 'uvx',
      args: ['mcp-server-wayback'],
      env: {
        ...(config.iaAccessKey && { WAYBACK_MCP_IA_ACCESS_KEY: config.iaAccessKey }),
        ...(config.iaSecretKey && { WAYBACK_MCP_IA_SECRET_KEY: config.iaSecretKey }),
      },
    })
